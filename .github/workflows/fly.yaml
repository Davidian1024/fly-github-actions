name: fly.io test workflow

on:
  workflow_dispatch:
    inputs:
      environment_hash:
        description: 'Unique environment hash code'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: superfly/flyctl-actions/setup-flyctl@master
    - run: |
        env
        echo $FLY_APP_NAME
        flyctl ssh console --app fctc-gitea-mariadb-${{ inputs.environment_hash }} --command "mariadb-dump --password=$MYSQL_ROOT_PASSWORD --single-transaction --all-databases --result-file=/$(date -u +%F-%H-%M)-dump.sql"
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
