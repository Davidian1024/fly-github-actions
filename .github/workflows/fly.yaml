name: fly.io test workflow

on:
  workflow_dispatch:
    inputs:
      environment_hash:
        description: 'Unique environment hash code'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: superfly/flyctl-actions/setup-flyctl@master
    - run: flyctl ssh console --app fctc-gitea-mariadb-{{ inputs.environment_hash }} --command 'sh ./test_script.sh'
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
